name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flake-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Run full gate (write-flake, lint, flake-check, launcher cases, etc.)
        run: nix run "path:$PWD#repo-gate" -- all
